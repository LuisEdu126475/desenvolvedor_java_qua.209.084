<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a href="index.html">Voltar</a>

    <h1>Formulário</h1>
    <!--formulario-->
    <form action=""method="">
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>
        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" name="idade" min="0" max="100"><br><br>
        <label for="altura">Altura</label><br>
        <input type="number" id="Altura" name="Altura" step="0.01"><br><br>
        <label for="data de nascimento">Data de nascimento:</label><br>
        <input type="date" id="dataNascimento" name="dataNascimento">
        <label for="genero">Gênero:</label><br>
        <input type="radio" id="genero" name="genero" value="Masculino"><span>Masculino</span><br>
        <input type="radio" id="genero" name="genero" value="Feminino"><span>Feminino</span><br>
        <input type="radio" id="genero" name="genero" value="Outros"><span>Outros</span><br><br>
        <label for="escolaridade">Escolaridade:</label><br>
        <select id="escolaridade" name="escolaridade">
            <option value="fundamental">Fundamental:</option>
            <option value="fundamental">Médio:</option>
            <option value="fundamental">Superior:</option>
            <option value="fundamental">Pós Graduação</option>
            <option value="fundamental">Mestrado</option>
            <option value="fundamental">Doutorado</option>
        </select><br><br>
        <label for="senha">Senha</label><br>
        <input type="password" id="senha" name="senha>"><br><br>
        <button type="submit">Cadastrar</button><br><br>
        <button type="reset">Resetar formulário</button><br><br>

    </form>
</body>
</html>
